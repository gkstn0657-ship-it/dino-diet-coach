spring.application.name=nyamnyam

# ===== Active Profile =====
# 기본은 local. 배포 시 SPRING_PROFILES_ACTIVE=prod 로 실행
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# ===== Server =====
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/

# ===== 파일 업로드(사진) 한도 =====
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# ===== DataSource (MySQL) =====
# createDatabaseIfNotExist=true 로 nyamnyam DB 가 없으면 자동 생성
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/nyamnyam?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ===== Schema/Data 초기화 (개발용: 매 실행 시 재생성) =====
spring.sql.init.mode=${SQL_INIT_MODE:always}
spring.sql.init.encoding=UTF-8

# ===== MyBatis =====
mybatis.mapper-locations=classpath:mappers/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-aliases-package=com.ssafy.nyamnyam

# ===== JWT =====
# 256bit 이상 시크릿. 반드시 환경변수(JWT_SECRET)로 주입 — 기본값 없음
jwt.secret=${JWT_SECRET}
jwt.access-token-validity=1800000
jwt.refresh-token-validity=1209600000

# ===== CORS =====
# 허용 출처. 콤마로 여러 개 지정 가능 (예: http://localhost:5173,https://nyamnyam.app)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ===== 프론트엔드 주소 (비밀번호 재설정 링크 생성용) =====
app.frontend-base-url=${FRONTEND_BASE_URL:http://localhost:5173}

# ===== 메일 발송 (SMTP) — 실제 계정/비밀번호는 환경변수/로컬 설정으로만 주입 =====
# 미설정이면 JavaMailSender 빈이 없어 메일 발송은 생략되고(개발 로그 fallback) 앱은 정상 기동된다.
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# 보내는 사람 표시 주소(없으면 username 사용)
app.mail.from=${MAIL_FROM:DinoDiet <no-reply@dinodiet.app>}

# ===== GMS (SSAFY 생성형 AI 게이트웨이, OpenAI 호환) =====
# 키는 환경변수(GMS_API_KEY)로만 주입 — 기본값 없음
ai.gms.base-url=${GMS_BASE_URL:https://gms.ssafy.io/gmsapi/api.openai.com/v1}
ai.gms.api-key=${GMS_API_KEY}
ai.gms.model=${GMS_MODEL:gpt-4o-mini}
# false 면 고정 목업 응답, true 면 실제 GMS 호출
ai.gms.enabled=${GMS_ENABLED:true}

# ===== Spring AI (OpenAI compatible GMS) =====
# base-url includes /v1 -> completions-path is /chat/completions only
spring.ai.openai.base-url=${GMS_BASE_URL:https://gms.ssafy.io/gmsapi/api.openai.com/v1}
spring.ai.openai.chat.completions-path=/chat/completions
spring.ai.openai.api-key=${GMS_API_KEY}
spring.ai.openai.chat.options.model=${GMS_MODEL:gpt-4o-mini}
# chat only -> disable unused model auto-config
spring.ai.model.embedding=none
spring.ai.model.image=none
spring.ai.model.moderation=none

# ===== 식약처 식품영양성분 DB (data.go.kr) =====
# 키는 환경변수(FOOD_API_KEY)로만 주입 — 기본값 없음
food.api.base-url=${FOOD_API_URL:https://apis.data.go.kr/1471000/FoodNtrCpntDbInfo02/getFoodNtrCpntDbInq02}
food.api.key=${FOOD_API_KEY}

# ===== Logging =====
logging.level.com.ssafy.nyamnyam=${LOG_LEVEL_APP:debug}
logging.level.org.mybatis=info
